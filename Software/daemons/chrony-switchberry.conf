# chrony-switchberry.conf
#
# Chrony configuration for Switchberry NTP server.
# Uses the CM4 Ethernet NIC PHC (/dev/ptp0) as the reference clock.
# The PHC is disciplined by ts2phc from GPS.
#
# This config is used by switchberry_chrony_guard.sh, which starts/stops
# chronyd based on ts2phc convergence status.

# Use the system clock as the reference.
# The time chain is: GPS -> DPLL -> ts2phc -> PHC -> phc2sys -> CLOCK_REALTIME
# We don't use "refclock PHC /dev/ptp0" directly because that interferes with
# ts2phc's PPS event capture on the BCM2711 genet NIC driver.
# phc2sys keeps CLOCK_REALTIME accurate, so chrony just serves it as stratum 1.
local stratum 1 orphan

# Serve NTP to all clients on the local network
allow all

# Don't use any pool/NTP servers — we ARE the source
# (chrony will use PHC exclusively)

# Drift file
driftfile /var/lib/chrony/chrony-switchberry.drift

# Log directory
logdir /var/log/chrony

# Stratum 1: direct hardware reference (GPS via PHC)
local stratum 1 orphan

# Sync hardware RTC on shutdown (optional)
rtcsync

# Make steps to correct large initial offsets (up to 3 steps in first 3 updates)
makestep 1.0 3
